<div class="blogs-page">
    <div class="grid-lines"></div>
    
    <header class="page-header">
        <div class="header-content">
            <div class="header-index reveal slide-left">
                <span class="index-line"></span>
                <span class="index-text">Archive</span>
            </div>
            
            <h1 class="reveal">
                <span class="word-wrap"><span class="word">Предыдущие</span></span><br>
                <span class="word-wrap"><span class="word">экспедиции</span></span>
            </h1>
            
            <p class="header-subtitle reveal" style="transition-delay: 0.3s">
                Хроники исторических походов и исследований
            </p>
        </div>
    </header>
    
    <section class="blogs-list">
        <div class="list-header reveal">
            <span class="list-count">{{ blogs().length }} экспедиций</span>
        </div>

        @for (blog of blogs(); track blog.id; let i = $index) {
            <article class="blog-item reveal" [style.transition-delay.ms]="100 + i * 80">
                <button type="button" class="item-preview tilt-card" (click)="navigate('blog/' + blog.id)">
                    <img [src]="blog.preview" [alt]="blog.title"/>
                    <div class="preview-overlay">
                        <span>Открыть</span>
                    </div>
                </button>
                
                <div class="item-content">
                    <div class="item-meta">
                        <span class="item-date">{{ blog.date }}</span>
                    </div>
                    
                    <h2 class="item-title">{{ blog.title }}</h2>
                    
                    <p class="item-excerpt">{{ blog.small_content }}</p>
                    
                    <button type="button" class="item-link" (click)="navigate('blog/' + blog.id)">
                        Читать далее
                        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                            <path d="M4 10H16M16 10L11 5M16 10L11 15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                </div>
            </article>
        } @empty {
            <div class="empty-state reveal">
                <span class="empty-icon">—</span>
                <p>Экспедиции не найдены</p>
            </div>
        }
    </section>
    
    <footer class="page-footer">
        <div class="footer-content reveal">
            <p>Вернитесь на главную страницу</p>
            <button type="button" class="btn-primary" (click)="navigate('/')">
                <span>На главную</span>
                <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                    <path d="M4 10H16M16 10L11 5M16 10L11 15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
        </div>
    </footer>
</div>
